<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>人間タワー - Human Tower</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui">
      <div id="score">0人</div>
      <div id="bestScore">BEST: 0人</div>
      <div id="nextCharacter">
        <div class="label">NEXT</div>
        <canvas id="nextCanvas" width="80" height="80"></canvas>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen">
      <h1>人間タワー</h1>
      <p class="subtitle">Human Tower</p>
      <div class="character-parade"></div>
      <button class="btn btn-start" onclick="startGame()">スタート</button>
      <div id="instructions">
        ドラッグで左右に移動<br>
        指を離すと落下！<br>
        台座から落としたらゲームオーバー！
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" style="display:none">
      <h2>ゲームオーバー</h2>
      <div id="finalScore">0人</div>
      <div id="newBest">NEW RECORD!</div>
      <button class="btn btn-retry" onclick="retryGame()">もう一回</button>
    </div>
  </div>

  <script src="js/characters.js?v=18"></script>
  <script src="js/physics.js?v=18"></script>
  <script src="js/game.js?v=18"></script>
</body>
</html>
