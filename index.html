<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>アニマルタワー</title>
  <link rel="stylesheet" href="css/style.css?v=21">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui">
      <div id="score">0人</div>
      <div id="bestScore">BEST: 0人</div>
      <div id="nextCharacter">
        <div class="label">NEXT</div>
        <canvas id="nextCanvas" width="80" height="80"></canvas>
      </div>
    </div>

    <!-- Name Input Screen (first time only) -->
    <div id="nameScreen" style="display:none">
      <div class="tiger-bg"></div>
      <div class="name-content">
        <h1 class="tiger-title">ANIMAL<br>TOWER</h1>
        <p class="name-label">名前を入力</p>
        <input type="text" id="nameInput" maxlength="12" placeholder="あなたの名前">
        <button class="btn btn-sexy" onclick="submitName()">OK</button>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" style="display:none">
      <div class="tiger-bg"></div>
      <div class="start-content">
        <h1 class="tiger-title">ANIMAL<br>TOWER</h1>
        <div id="playerName" class="player-name"></div>
        <button class="btn btn-sexy" onclick="startGame()">SEXY START</button>
        <button class="btn btn-ranking" onclick="showRanking()">RANKING</button>
      </div>
    </div>

    <!-- Ranking Screen -->
    <div id="rankingScreen" style="display:none">
      <div class="tiger-bg"></div>
      <div class="ranking-content">
        <h2 class="ranking-title">WORLD RANKING</h2>
        <div id="rankingList" class="ranking-list"></div>
        <button class="btn btn-back" onclick="hideRanking()">BACK</button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" style="display:none">
      <h2>ゲームオーバー</h2>
      <div id="finalScore">0人</div>
      <div id="newBest">NEW RECORD!</div>
      <button class="btn btn-retry" onclick="retryGame()">もう一回</button>
      <button class="btn btn-ranking-small" onclick="showRanking()">RANKING</button>
    </div>
  </div>

  <script src="js/characters.js?v=21"></script>
  <script src="js/physics.js?v=21"></script>
  <script src="js/ranking.js?v=21"></script>
  <script src="js/game.js?v=21"></script>
</body>
</html>
